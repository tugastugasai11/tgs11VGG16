<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cerdas Klasifikasi Sepatu</title>
    <!-- Integrasi Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Integrasi Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        /* Pengaturan Dasar Body */
        body { 
            color: #4A4A4A; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0;
            padding: 20px 0;
        }

        /* Trik Background Blur menggunakan Pseudo-element */
        body::before {
            content: "";
            position: fixed;
            /* Dibuat lebih lebar sedikit agar pinggiran blur tidak terlihat putih */
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            background-image: url("{{ url_for('static', filename='bgt.jpg') }}");
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* Intensitas blur background */
            z-index: -1; /* Mendorong background ke paling belakang */
        }
        
        /* Warna Utama (Primary) */
        .text-custom-primary { color: #929FC1 !important; }
        .text-custom-muted { color: #4A4A4A !important; opacity: 0.9; }
        
        /* Tombol Utama (Primary) */
        .btn-custom-primary {
            background-color: #929FC1; 
            border-color: #929FC1;
            color: #FEFEF2; 
            transition: all 0.3s ease;
        }
        .btn-custom-primary:hover {
            background-color: #7a88ab; 
            border-color: #7a88ab;
            color: #FEFEF2;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(146, 159, 193, 0.4);
        }

        /* Warna Aksen (Secondary/Accent) untuk Hasil Prediksi */
        .badge-custom-accent {
            background-color: #F2D965; 
            color: #4A4A4A; 
        }

        /* Card Form dengan efek Glassmorphism (Kaca) agar UI tetap bersih */
        .card {
            background-color: rgba(254, 254, 242, 0.85); /* Putih gading semi-transparan */
            backdrop-filter: blur(12px); /* Efek blur pada background di belakang card */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Tag Merek Sepatu */
        .brand-tag {
            border: 1px solid #929FC1;
            color: #929FC1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin: 0 4px 15px 4px;
        }

        /* Gambar Preview Hasil */
        .preview-img { 
            max-height: 250px; 
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Kotak Form Upload -->
                <div class="card p-4 p-lg-5">
                    
                    <div class="text-center mb-4">
                        <h1 class="display-6 fw-bold text-custom-primary mb-3">Shoes Classifier</h1>
                        <p class="text-custom-muted fs-6 mb-4">
                            Unggah foto sepatu Anda dan model Deep Learning kami memprediksi mereknya.
                        </p>
                        <!-- Label Merek yang Didukung -->
                        <div>
                            <span class="brand-tag">Adidas</span>
                            <span class="brand-tag">Converse</span>
                            <span class="brand-tag">Nike</span>
                        </div>
                    </div>

                    <form action="/" method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="file" class="form-label fw-bold">
                                <i class="bi bi-cloud-arrow-up-fill me-2 text-custom-primary fs-5"></i>Pilih Gambar Sepatu:
                            </label>
                            <input class="form-control form-control-lg bg-light border-0" type="file" id="file" name="file" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-custom-primary btn-lg w-100 fw-bold">
                            <i class="bi bi-search me-2"></i>Mulai Deteksi
                        </button>
                    </form>

                    <!-- Menampilkan Pesan Error -->
                    {% if error %}
                        <div class="alert alert-danger mt-4 d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div>{{ error }}</div>
                        </div>
                    {% endif %}

                    <!-- Menampilkan Hasil Prediksi -->
                    {% if prediction %}
                        <hr class="mt-4 mb-4 text-muted">
                        <div class="text-center">
                            <p class="text-custom-muted mb-1 fw-semibold">Hasil Analisis:</p>
                            <h3 class="fw-bold mb-2">
                                <span class="badge badge-custom-accent px-4 py-2 rounded-pill shadow-sm">{{ prediction }}</span>
                            </h3>
                            <p class="text-custom-muted small">Tingkat Keyakinan: {{ confidence|round(2) }}%</p>
                            <img src="{{ image_path }}" alt="Gambar Sepatu" class="img-fluid rounded mt-3 preview-img shadow-sm border bg-white">
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
